<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lexip Vector Viewer</title>
<style>
body { margin: 0; overflow: hidden; background: #111; color: white; font-family: sans-serif; }
#fileInput { position: absolute; top: 10px; left: 10px; z-index: 10; background: #222; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; }
</style>
</head>
<body>
<input type="file" id="fileInput" accept=".lxp">
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let curves = [], scale = 1.0, offsetX = 0, offsetY = 0, dragging = false, lastX = 0, lastY = 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}
window.addEventListener("resize", resize);

document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const data = JSON.parse(evt.target.result);
            curves = data.curves || [];
            draw();
        } catch(err) {
            console.error("Failed parsing LXP payload structure:", err);
        }
    };
    reader.readAsText(file);
});

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    
    for (let i = 0; i < curves.length; i++) {
        const curve = curves[i];
        const pts = curve.points;
        if (!pts || pts.length < 2) continue;
        
        ctx.strokeStyle = `rgb(${curve.color[0]}, ${curve.color[1]}, ${curve.color[2]})`;
        ctx.lineWidth = curve.thickness;
        
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let j = 1; j < pts.length; j++) {
            ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
    }
    ctx.restore();
}

function toCurveSpace(x, y) { return [(x - offsetX) / scale, (y - offsetY) / scale]; }

canvas.addEventListener("mousedown", (e) => { 
    const rect = canvas.getBoundingClientRect();
    dragging = true; 
    lastX = e.clientX - rect.left; 
    lastY = e.clientY - rect.top; 
});

canvas.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const currentX = e.clientX - rect.left;
    const currentY = e.clientY - rect.top;
    
    offsetX += currentX - lastX;
    offsetY += currentY - lastY;
    
    lastX = currentX; 
    lastY = currentY;
    draw();
});

canvas.addEventListener("mouseup", () => dragging = false);
canvas.addEventListener("mouseleave", () => dragging = false);

canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const [zoomX, zoomY] = toCurveSpace(mouseX, mouseY);
    
    const zoomFactor = e.deltaY < 0 ? 1.1 : 1.0 / 1.1;
    scale *= zoomFactor;
    
    offsetX = mouseX - zoomX * scale;
    offsetY = mouseY - zoomY * scale;
    draw();
}, { passive: false });

window.onload = resize;
</script>
</body>
</html>
